<svg width="7680" height="4320" viewBox="0 0 7680 4320" xmlns="http://www.w3.org/2000/svg">
  <!-- Định nghĩa dải màu Gradient RGB siêu rộng -->
  <defs>
    <linearGradient id="rgbGradient8K" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#FFFF00;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#00FF00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0000FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Hiệu ứng đổ bóng nhẹ để chữ nổi bật hơn trên nền đen -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur" />
      <feOffset dx="0" dy="0" result="offsetBlur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Nền đen sâu -->
  <rect width="100%" height="100%" fill="#000000" />

  <!-- Văn bản Tran Gia Noi 8K -->
  <text 
    x="50%" 
    y="50%" 
    font-family="Segoe UI, Arial, sans-serif" 
    font-size="800" 
    font-weight="900" 
    fill="url(#rgbGradient8K)" 
    filter="url(#softShadow)"
    text-anchor="middle" 
    dominant-baseline="middle">
    Tran Gia Noi
  </text>
</svg>
