<svg width="400" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rgbGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0000" /> <!-- Red -->
      <stop offset="33%" stop-color="#00ff00" /> <!-- Green -->
      <stop offset="66%" stop-color="#0000ff" /> <!-- Blue -->
      <stop offset="100%" stop-color="#ff0000" /> <!-- Back to Red for continuity -->
    </linearGradient>
  </defs>

  <!-- Background for contrast (optional, can be removed) -->
  <rect width="100%" height="100%" fill="#333333" />

  <!-- Text with RGB Gradient -->
  <text x="200" y="75" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#rgbGradient)" text-anchor="middle" dominant-baseline="middle">
    Tran Gia Noi
  </text>
</svg>
